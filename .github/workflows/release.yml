name: Release (npm)

# Publishes @selectwin/sdk to npm on a version tag (vX.Y.Z), tokenless via npm
# Trusted Publishing (OIDC) + build provenance.
#
# One-time setup on npmjs.com (Package → Settings → Trusted Publisher):
#   Publisher = GitHub Actions, org/repo = selectwin/sdk-nodejs,
#   workflow = release.yml, environment = npm.
# With that in place no NPM_TOKEN secret is needed.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC token exchange for Trusted Publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@selectwin/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      # Trusted Publishing requires npm >= 11.5.1 (newer than what setup-node ships).
      - name: Update npm
        run: npm install -g npm@latest
      - run: npm ci
      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG=${GITHUB_REF_NAME#v}
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
      - run: npm run build
      - run: npm test
      - name: Publish to npm (idempotent — skip if this version is already published)
        # Auth resolves automatically: if the NPM_TOKEN secret is set it's used
        # (handy to bootstrap the first publish); otherwise npm falls back to
        # Trusted Publishing (OIDC) via the id-token permission above. Either way
        # this job needs no interactive token — just push a tag.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "@selectwin/sdk@$VER" version >/dev/null 2>&1; then
            echo "@selectwin/sdk@$VER is already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi
